name: 5-trigger-saucectl-framework-sync

on:
  workflow_dispatch:
    inputs:
      framework:
        description: "Limit to one framework (cypress | playwright | testcafe). Leave empty to sync all."
        required: false
        default: ""

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Run saucectl sync-framework-versions
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_GITHUB_WORKFLOW }}
        run: |
          gh workflow run sync-runner-updates.yml \
            --repo saucelabs/saucectl \
            --ref main \
            -f framework="${{ inputs.framework }}"
